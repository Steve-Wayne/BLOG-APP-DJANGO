name: Invisio CI/CD
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch: {}
jobs:
  python-ci:
    name: Python CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |-
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run tests
        run: if command -v pytest &> /dev/null; then pytest; else echo 'No pytest found'; fi
permissions:
  contents: read
