name: Invisio CI/CD
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch: {}
jobs:
  node-ci:
    name: Node.js CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test --if-present
      - name: Run linter
        run: npm run lint --if-present
permissions:
  contents: read
